services:
  backend:
    image: python:3.12-slim
    working_dir: /app/backend
    volumes:
      - .:/app
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
  frontend:
    image: python:3.12-slim
    working_dir: /app/frontend
    volumes:
      - .:/app
    environment:
      EXPENSE_API_BASE: http://backend:8000/api/v1
    command: sh -c "pip install -r requirements.txt && streamlit run app.py --server.address 0.0.0.0 --server.port 8501"
    ports:
      - "8501:8501"
    depends_on:
      - backend
